<header class="border-b border-line bg-paper">
  <div class="msl-container flex h-20 items-center justify-between">
    <a href="/" class="flex items-center gap-3">
      <img src="/static/brand/msl-the-practice-logo-cropped.png" alt="MSL The Practice" class="h-5 w-auto" />
      <span class="h-5 w-px bg-line"></span>
      <span class="text-sm font-medium tracking-wide text-ink/70">Media Insights</span>
    </a>
    {% if authenticated %}
      <form action="/logout" method="post">
        <button type="submit" class="text-sm font-medium text-ink/60 transition hover:text-accent">
          Log out
        </button>
      </form>
    {% endif %}
  </div>
</header>
